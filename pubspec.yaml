name: aws_task2
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8
  
  # Navigation and Typography dependencies
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  http: ^1.2.0 
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Standard linting for Flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/